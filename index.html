<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2026 충북 월드컵 캠페인 - 예선전</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap');
:root {
  --blue:#0f69b4; --blue-dark:#183b68; --blue-light:#e8f2fc;
  --green:#1b9d68; --green-light:#edf7f2;
  --red:#e53e3e; --red-light:#fff5f5;
  --gold:#f6ad1a; --silver:#94a3b8; --bronze:#c47c2e;
  --line:#d9e4ef; --text:#18283c; --text-sub:#6e7f93;
  --card:#fff; --bg:#f4f8fc;
  --shadow:0 8px 24px rgba(21,53,84,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}

/* ── Layout ── */
.page{max-width:1400px;margin:0 auto;padding:24px;}
.header{background:linear-gradient(135deg,#183b68 0%,#0f69b4 100%);border-radius:20px;padding:28px 32px;margin-bottom:20px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.header h1{font-size:clamp(20px,3vw,28px);font-weight:800;letter-spacing:-.03em;}
.header .sub{font-size:13px;opacity:.75;margin-top:4px;}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;background:#edf4fb;border:1px solid #d9e6f2;border-radius:14px;padding:5px;margin-bottom:20px;}
.tab{flex:1;height:42px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:700;color:#6e8198;background:transparent;cursor:pointer;transition:.2s;}
.tab.active{background:#fff;color:var(--blue-dark);box-shadow:0 4px 12px rgba(15,105,180,.1);}

/* ── Mode toggle ── */
.mode-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.mode-label{font-size:13px;color:var(--text-sub);}
.admin-btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--line);background:#fff;font-family:inherit;font-size:13px;font-weight:700;color:var(--blue-dark);cursor:pointer;transition:.2s;}
.admin-btn:hover{border-color:var(--blue);color:var(--blue);}
.admin-btn.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}

/* ── Upload area ── */
.upload-panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:20px;display:none;}
.upload-panel.show{display:block;}
.upload-tabs{display:flex;gap:6px;margin-bottom:18px;}
.upload-tab{flex:1;height:38px;border-radius:10px;border:1px solid var(--line);font-family:inherit;font-size:13px;font-weight:700;color:#6e8198;background:#f8fbfe;cursor:pointer;transition:.2s;}
.upload-tab.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}
.upload-section{display:none;}
.upload-section.active{display:block;}
/* 파일 업로드 */
.file-drop{border:2px dashed #c8dcee;border-radius:14px;padding:24px;text-align:center;transition:.2s;}
.file-drop:hover{border-color:var(--blue);}
.upload-icon{font-size:32px;margin-bottom:8px;}
.file-drop p{font-size:13px;color:var(--text-sub);margin-bottom:12px;}
.file-input{display:none;}
.upload-btn{height:42px;padding:0 18px;border-radius:11px;background:linear-gradient(180deg,#1976c5,#0f69b4);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 8px 16px rgba(15,105,180,.18);}
/* 붙여넣기 */
.paste-label{font-size:13px;font-weight:700;color:var(--blue-dark);margin-bottom:8px;display:block;}
.paste-hint{font-size:12px;color:var(--text-sub);margin-bottom:10px;}
.paste-area{width:100%;height:160px;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:'Noto Sans KR',monospace;font-size:13px;color:var(--text);resize:vertical;outline:none;transition:.2s;}
.paste-area:focus{border-color:#8ebce4;box-shadow:0 0 0 4px rgba(15,105,180,.08);}
.paste-btn{margin-top:10px;height:42px;padding:0 18px;border-radius:11px;background:linear-gradient(180deg,#1976c5,#0f69b4);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 8px 16px rgba(15,105,180,.18);}
.upload-status{margin-top:10px;font-size:13px;font-weight:700;min-height:18px;}

/* ── Summary cards ── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:800px){.summary-row{grid-template-columns:repeat(2,1fr);}}
.summary-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);}
.summary-card span{font-size:12px;color:var(--text-sub);display:block;margin-bottom:6px;}
.summary-card strong{font-size:20px;font-weight:800;color:var(--blue-dark);}

/* ── Group grid ── */
.groups-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;}
@media(max-width:900px){.groups-grid{grid-template-columns:1fr;}}
.group-panel{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;}
.group-header{padding:16px 20px;background:linear-gradient(180deg,#f8fbff,#f0f6fc);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.group-header h3{font-size:18px;font-weight:800;color:var(--blue-dark);}
.group-header .group-sub{font-size:12px;color:var(--text-sub);}
.group-table{width:100%;border-collapse:collapse;}
.group-table th{background:#eef5fc;font-size:11px;font-weight:800;color:var(--blue-dark);padding:10px 12px;text-align:center;letter-spacing:.04em;}
.group-table td{padding:12px;text-align:center;border-bottom:1px solid #f0f4f8;font-size:13px;font-weight:600;color:#294564;}
.group-table tr:last-child td{border-bottom:none;}
.group-table tr.advance{background:linear-gradient(90deg,rgba(15,105,180,.04),transparent);}
.group-table tr.advance td:first-child{border-left:3px solid var(--blue);}

/* rank badge */
.rank{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:800;}
.rank.r1{background:#fef3c7;color:#b45309;}
.rank.r2{background:#f1f5f9;color:#475569;}
.rank.r3{background:#fff7ed;color:#92400e;}
.rank.r4,.rank.r5{background:#f8fafc;color:#94a3b8;}

/* rate bar */
.rate-wrap{display:flex;align-items:center;gap:8px;justify-content:center;}
.rate-bar{width:80px;height:7px;border-radius:999px;background:#e7eef6;overflow:hidden;}
.rate-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#0f69b4,#4b97d6);transition:.4s;}
.rate-val{font-size:13px;font-weight:800;color:var(--blue-dark);min-width:44px;text-align:right;}

/* advance badge */
.adv-badge{display:inline-flex;align-items:center;height:24px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:800;}
.adv-badge.champ{background:#fef3c7;color:#b45309;border:1px solid #fde68a;}
.adv-badge.premier{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe;}
.adv-badge.challenger{background:var(--green-light);color:var(--green);border:1px solid #d1fae5;}
.adv-badge.tbd{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0;}

/* ── Promotion preview ── */
.promo-panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.promo-panel h3{font-size:16px;font-weight:800;color:var(--blue-dark);margin-bottom:14px;}
.promo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:700px){.promo-grid{grid-template-columns:1fr;}}
.promo-card{border-radius:14px;padding:14px 16px;border:1px solid;}
.promo-card.champ{background:#fffbeb;border-color:#fde68a;}
.promo-card.premier{background:#eef2ff;border-color:#c7d2fe;}
.promo-card.challenger{background:#f0fdf4;border-color:#bbf7d0;}
.promo-card h4{font-size:13px;font-weight:800;margin-bottom:8px;}
.promo-card.champ h4{color:#b45309;}
.promo-card.premier h4{color:#3730a3;}
.promo-card.challenger h4{color:#15803d;}
.promo-item{font-size:13px;color:#294564;padding:4px 0;border-bottom:1px dashed #e5e7eb;}
.promo-item:last-child{border-bottom:none;}
.promo-item.tbd{color:#94a3b8;font-style:italic;}

/* ── Last updated ── */
.last-update{font-size:12px;color:var(--text-sub);text-align:right;margin-bottom:8px;}

/* ── Password modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(14,27,44,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;width:min(360px,90vw);box-shadow:0 24px 60px rgba(21,53,84,.18);}
.modal h3{font-size:18px;font-weight:800;color:var(--blue-dark);margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text-sub);margin-bottom:18px;}
.modal input{width:100%;height:48px;border-radius:12px;border:1px solid var(--line);padding:0 14px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;}
.modal input:focus{border-color:#8ebce4;box-shadow:0 0 0 4px rgba(15,105,180,.08);}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;height:44px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--line);}
.modal-btns .confirm{background:linear-gradient(180deg,#1976c5,#0f69b4);color:#fff;border-color:transparent;box-shadow:0 8px 16px rgba(15,105,180,.18);}
.modal-err{font-size:13px;color:var(--red);margin-bottom:8px;min-height:18px;}

/* ── Toast ── */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:10000;display:grid;gap:8px;width:min(340px,calc(100vw - 32px));}
.toast{background:rgba(24,59,104,.96);color:#fff;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:700;animation:toastIn .25s ease;}
.toast.hide{animation:toastOut .25s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Password Modal -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>관리자 인증</h3>
    <p>엑셀 업로드 및 데이터 관리 기능을 사용하려면 비밀번호를 입력해 주세요.</p>
    <div class="modal-err" id="pw-err"></div>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" />
    <div class="modal-btns">
      <button onclick="closeModal()">취소</button>
      <button class="confirm" onclick="checkPassword()">확인</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div>
      <div style="font-size:11px;opacity:.6;letter-spacing:.12em;margin-bottom:6px;">HYUNDAI MOTOR · CHUNGBUK REGIONAL HQ</div>
      <h1>2026 충북 월드컵 캠페인</h1>
      <div class="sub">예선전 (6월 1일 ~ 12일) · 조별 순위 현황</div>
    </div>
    <div class="header-right">
      <div id="last-update" style="font-size:12px;opacity:.7;">데이터 없음</div>
      <button class="admin-btn" id="admin-toggle-btn" onclick="toggleAdminMode()">🔒 관리자</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('branch')">지점 (10개)</button>
    <button class="tab" onclick="switchTab('agency')">대리점 (12개)</button>
  </div>

  <!-- Upload Panel -->
  <div class="upload-panel" id="upload-panel">
    <div class="upload-tabs">
      <button class="upload-tab active" id="utab-paste" onclick="switchUploadTab('paste')">📋 붙여넣기</button>
      <button class="upload-tab" id="utab-file" onclick="switchUploadTab('file')">📂 엑셀 파일</button>
    </div>
    <div class="upload-section active" id="upload-paste">
      <span class="paste-label">엑셀에서 복사 → 여기에 붙여넣기</span>
      <div class="paste-hint">엑셀에서 <strong>거점명 + 누계 출고</strong> 두 컬럼 선택 후 복사(Ctrl+C) → 아래 박스 클릭 후 붙여넣기(Ctrl+V)</div>
      <textarea class="paste-area" id="paste-area" placeholder="여기에 붙여넣기 하세요

예시:
청주북부	10
청주서부	11
오창	3"></textarea>
      <br/>
      <button class="paste-btn" onclick="parsePaste()">✅ 적용하기</button>
    </div>
    <div class="upload-section" id="upload-file">
      <div class="file-drop">
        <div class="upload-icon">📂</div>
        <p><strong>엑셀 파일 업로드</strong> · 컬럼: <code>거점명</code> / <code>누계 출고</code></p>
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">엑셀 파일 선택</button>
        <input type="file" id="file-input" class="file-input" accept=".xlsx,.xls" onchange="handleFile(event)"/>
      </div>
    </div>
    <div class="upload-status" id="upload-status"></div>
  </div>

  <!-- Branch Section -->
  <div id="section-branch">
    <div class="summary-row" id="branch-summary"></div>
    <div class="groups-grid" id="branch-groups"></div>
    <div class="promo-panel">
      <h3>🏆 본선 진출 현황 (예상)</h3>
      <div class="promo-grid" id="branch-promo"></div>
    </div>
  </div>

  <!-- Agency Section -->
  <div id="section-agency" style="display:none;">
    <div class="summary-row" id="agency-summary"></div>
    <div class="groups-grid" id="agency-groups"></div>
    <div class="promo-panel">
      <h3>🏆 본선 진출 현황 (예상)</h3>
      <div class="promo-grid" id="agency-promo"></div>
    </div>
  </div>
</div>

<script>
// ── 비밀번호 ────────────────────────────────────────────
const ADMIN_PASSWORD = '1234'; // 원하는 비밀번호로 변경
const STORAGE_KEY = 'campaign2026_data';

// ── 데이터 정의 ──────────────────────────────────────────
const BRANCH_GROUPS = {
  'A조': ['오창','청주','옥천영동','진천','제천'],
  'B조': ['청주북부','청주서부','충주','청주남부','금왕']
};
const AGENCY_GROUPS = {
  'A조': ['영동금강','제천중앙','연수'],
  'B조': ['오창제일','진천중앙','가경'],
  'C조': ['서청주','교현','음성'],
  'D조': ['증평삼보','보은','단양']
};

const TARGETS = {
  '청주북부':60,'옥천영동':46,'청주서부':91,'청주남부':130,
  '충주':96,'청주':70,'오창':42,'진천':54,'금왕':40,'제천':73,
  '영동금강':47,'증평삼보':81,'오창제일':139,'보은':65,
  '서청주':133,'가경':143,'진천중앙':67,'제천중앙':75,
  '교현':80,'연수':84,'음성':65,'단양':44
};

// ── 상태 ────────────────────────────────────────────────
let isAdmin = false;
let currentTab = 'branch';
let shippingData = {}; // { 거점명: 누계출고 }
let lastUpdated = '';

// ── localStorage ────────────────────────────────────────
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ shippingData, lastUpdated }));
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    shippingData = d.shippingData || {};
    lastUpdated = d.lastUpdated || '';
  } catch(e) {}
}

// ── 관리자 모드 ──────────────────────────────────────────
function toggleAdminMode() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('admin-toggle-btn').textContent = '🔒 관리자';
    document.getElementById('admin-toggle-btn').classList.remove('active');
    document.getElementById('upload-panel').classList.remove('show');
    showToast('관리자 모드 종료');
  } else {
    document.getElementById('pw-modal').classList.add('show');
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  }
}
function closeModal() {
  document.getElementById('pw-modal').classList.remove('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
}
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    closeModal();
    document.getElementById('admin-toggle-btn').textContent = '🔓 관리자 모드';
    document.getElementById('admin-toggle-btn').classList.add('active');
    document.getElementById('upload-panel').classList.add('show');
    showToast('관리자 모드 활성화');
  } else {
    document.getElementById('pw-err').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ── 업로드 탭 전환 ──────────────────────────────────────
function switchUploadTab(tab) {
  ['paste','file'].forEach(t => {
    document.getElementById('utab-' + t).classList.toggle('active', t === tab);
    document.getElementById('upload-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('upload-status').textContent = '';
}

// ── 붙여넣기 파싱 ────────────────────────────────────────
function parsePaste() {
  const raw = document.getElementById('paste-area').value.trim();
  const status = document.getElementById('upload-status');
  if (!raw) {
    status.textContent = '내용을 붙여넣어 주세요.';
    status.style.color = 'var(--red)';
    return;
  }
  const lines = raw.split('\n').filter(l => l.trim());
  let count = 0;
  lines.forEach(line => {
    const parts = line.split('\t');
    if (parts.length < 2) return;
    const name = parts[0].trim().replace(/\s/g, '');
    const val = parseInt(parts[parts.length - 1].trim());
    if (name && !isNaN(val) && name !== '거점명' && name !== '지점명') {
      shippingData[name] = val;
      count++;
    }
  });
  if (count === 0) {
    status.textContent = '❌ 인식된 데이터가 없어요. 탭으로 구분된 형식인지 확인해 주세요.';
    status.style.color = 'var(--red)';
    return;
  }
  lastUpdated = new Date().toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  saveData();
  renderAll();
  status.textContent = `✅ ${count}개 거점 데이터 적용 완료`;
  status.style.color = 'var(--green)';
  showToast(`${count}개 거점 데이터 업데이트 완료`);
  document.getElementById('paste-area').value = '';
}

// ── 엑셀 파일 처리 ───────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.textContent = '파일 읽는 중...';
  status.style.color = 'var(--text-sub)';

  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      let count = 0;
      rows.forEach(row => {
        // 컬럼명 유연하게 매칭
        const name = (row['거점명'] || row['지점명'] || row['대리점명'] || '').toString().replace(/\s/g,'');
        const val = parseInt(row['누계 출고'] || row['누계출고'] || row['출고'] || 0);
        if (name && !isNaN(val)) {
          shippingData[name] = val;
          count++;
        }
      });

      lastUpdated = new Date().toLocaleString('ko-KR', {
        month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
      });

      saveData();
      renderAll();
      status.textContent = `✅ ${count}개 거점 데이터 업로드 완료`;
      status.style.color = 'var(--green)';
      showToast(`${count}개 거점 데이터 업데이트 완료`);
    } catch(err) {
      status.textContent = '❌ 파일 읽기 실패. 컬럼명을 확인해 주세요.';
      status.style.color = 'var(--red)';
    }
  };
  reader.readAsBinaryString(file);
  e.target.value = '';
}

// ── 계산 ─────────────────────────────────────────────────
function calcRate(name) {
  const shipped = shippingData[name] ?? 0;
  const target = TARGETS[name] ?? 1;
  return shipped / target;
}

function calcRate2(name) {
  return (calcRate(name) * 100).toFixed(1);
}

function getRankedGroup(groupName, members) {
  return [...members].sort((a, b) => calcRate(b) - calcRate(a));
}

// ── 렌더 ─────────────────────────────────────────────────
function renderAll() {
  document.getElementById('last-update').textContent =
    lastUpdated ? `최종 업데이트: ${lastUpdated}` : '데이터 없음';
  renderBranch();
  renderAgency();
}

function renderBranch() {
  // Summary
  const allBranch = Object.values(BRANCH_GROUPS).flat();
  const totalShipped = allBranch.reduce((s,n) => s + (shippingData[n]||0), 0);
  const totalTarget = allBranch.reduce((s,n) => s + (TARGETS[n]||0), 0);
  document.getElementById('branch-summary').innerHTML = `
    <div class="summary-card"><span>총 지점</span><strong>10개</strong></div>
    <div class="summary-card"><span>누계 출고</span><strong>${totalShipped}대</strong></div>
    <div class="summary-card"><span>총 목표</span><strong>${totalTarget}대</strong></div>
    <div class="summary-card"><span>달성율</span><strong>${totalTarget?(totalShipped/totalTarget*100).toFixed(1):0}%</strong></div>
  `;

  // Groups
  const groupsEl = document.getElementById('branch-groups');
  groupsEl.innerHTML = '';
  const promoData = { champ:[], premier:[] };

  Object.entries(BRANCH_GROUPS).forEach(([gname, members]) => {
    const ranked = getRankedGroup(gname, members);
    const card = document.createElement('div');
    card.className = 'group-panel';

    let rows = ranked.map((name, i) => {
      const rate = calcRate(name);
      const rateStr = calcRate2(name);
      const shipped = shippingData[name] ?? 0;
      const target = TARGETS[name];
      const rankClass = ['r1','r2','r3','r4','r5'][i];
      const isAdvance = i < 2; // 1,2위 챔피언스
      const advBadge = i < 2
        ? '<span class="adv-badge champ">챔피언스</span>'
        : '<span class="adv-badge premier">프리미어</span>';
      const barW = Math.min(rate * 100, 100).toFixed(0);
      return `<tr class="${isAdvance?'advance':''}">
        <td><span class="rank ${rankClass}">${i+1}</span></td>
        <td style="text-align:left;font-weight:700;">${name}</td>
        <td>${shipped} / ${target}</td>
        <td>
          <div class="rate-wrap">
            <div class="rate-bar"><div class="rate-fill" style="width:${barW}%"></div></div>
            <span class="rate-val">${rateStr}%</span>
          </div>
        </td>
        <td>${advBadge}</td>
      </tr>`;
    }).join('');

    card.innerHTML = `
      <div class="group-header">
        <h3>${gname}</h3>
        <span class="group-sub">5개 지점 · 1~2위 챔피언스 진출</span>
      </div>
      <table class="group-table">
        <thead><tr><th>순위</th><th>지점명</th><th>출고/목표</th><th>달성율</th><th>본선</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    groupsEl.appendChild(card);

    // 진출 데이터 수집
    ranked.forEach((name, i) => {
      if (i < 2) promoData.champ.push({ name, group: gname, rank: i+1 });
      else promoData.premier.push({ name, group: gname, rank: i+1 });
    });
  });

  // Promo preview
  const promoEl = document.getElementById('branch-promo');
  promoEl.innerHTML = `
    <div class="promo-card champ">
      <h4>🏆 챔피언스 리그 (4개)</h4>
      ${promoData.champ.map(d=>`<div class="promo-item">${d.name} <span style="color:var(--text-sub);font-size:12px;">${d.group} ${d.rank}위</span></div>`).join('')}
    </div>
    <div class="promo-card premier">
      <h4>⚽ 프리미어 리그 (6개)</h4>
      ${promoData.premier.map(d=>`<div class="promo-item">${d.name} <span style="color:var(--text-sub);font-size:12px;">${d.group} ${d.rank}위</span></div>`).join('')}
    </div>
    <div class="promo-card" style="background:#f8fafc;border-color:#e2e8f0;">
      <h4 style="color:#64748b;">📋 포상 규모</h4>
      <div class="promo-item">챔피언스 1위 120만원</div>
      <div class="promo-item">챔피언스 2위 100만원</div>
      <div class="promo-item">챔피언스 3위 80만원</div>
      <div class="promo-item">챔피언스 4위 70만원</div>
      <div class="promo-item">프리미어 1위 50만원</div>
      <div class="promo-item" style="color:var(--text-sub);font-size:12px;">총 510만원 규모</div>
    </div>
  `;
}

function renderAgency() {
  const allAgency = Object.values(AGENCY_GROUPS).flat();
  const totalShipped = allAgency.reduce((s,n) => s + (shippingData[n]||0), 0);
  const totalTarget = allAgency.reduce((s,n) => s + (TARGETS[n]||0), 0);
  document.getElementById('agency-summary').innerHTML = `
    <div class="summary-card"><span>총 대리점</span><strong>12개</strong></div>
    <div class="summary-card"><span>누계 출고</span><strong>${totalShipped}대</strong></div>

  `;

  const groupsEl = document.getElementById('agency-groups');
  groupsEl.innerHTML = '';
  const promoData = { champ:[], premier:[], challenger:[] };

  Object.entries(AGENCY_GROUPS).forEach(([gname, members]) => {
    const ranked = getRankedGroup(gname, members);
    const card = document.createElement('div');
    card.className = 'group-panel';

    let rows = ranked.map((name, i) => {
      const rate = calcRate(name);
      const rateStr = calcRate2(name);
      const shipped = shippingData[name] ?? 0;
      const target = TARGETS[name];
      const rankClass = ['r1','r2','r3'][i];
      const barW = Math.min(rate * 100, 100).toFixed(0);
      const advBadge = i === 0
        ? '<span class="adv-badge champ">챔피언스</span>'

        ? '<span class="adv-badge premier">프리미어</span>'

      return `<tr class="${i===0?'advance':''}">
        <td><span class="rank ${rankClass}">${i+1}</span></td>
        <td style="text-align:left;font-weight:700;">${name}</td>
        <td>${shipped} / ${target}</td>
        <td>
          <div class="rate-wrap">
            <div class="rate-bar"><div class="rate-fill" style="width:${barW}%"></div></div>
            <span class="rate-val">${rateStr}%</span>
          </div>
        </td>
        <td>${advBadge}</td>
      </tr>`;
    }).join('');

    card.innerHTML = `
      <div class="group-header">
        <h3>${gname}</h3>
        <span class="group-sub">3개 대리점 · 1위 챔피언스 / 2위 프리미어 / 3위 챌린저스</span>
      </div>
      <table class="group-table">
        <thead><tr><th>순위</th><th>대리점명</th><th>출고/목표</th><th>달성율</th><th>본선</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    groupsEl.appendChild(card);

    ranked.forEach((name, i) => {
      if (i === 0) promoData.champ.push({ name, group: gname });
      else if (i === 1) promoData.premier.push({ name, group: gname });
      else promoData.challenger.push({ name, group: gname });
    });
  });

  const promoEl = document.getElementById('agency-promo');
  promoEl.innerHTML = `
    <div class="promo-card champ">
      <h4>🏆 챔피언스 리그 (4개)</h4>
      ${promoData.champ.map(d=>`<div class="promo-item">${d.name} <span style="color:var(--text-sub);font-size:12px;">${d.group} 1위</span></div>`).join('')}
    </div>
    <div class="promo-card premier">
      <h4>⚽ 프리미어 리그 (4개)</h4>
      ${promoData.premier.map(d=>`<div class="promo-item">${d.name} <span style="color:var(--text-sub);font-size:12px;">${d.group} 2위</span></div>`).join('')}
    </div>
    <div class="promo-card challenger">
      <h4>🌱 챌린저스 리그 (4개)</h4>
      ${promoData.challenger.map(d=>`<div class="promo-item">${d.name} <span style="color:var(--text-sub);font-size:12px;">${d.group} 3위</span></div>`).join('')}
    </div>
  `;
}

// ── 탭 전환 ──────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i===0&&tab==='branch')||(i===1&&tab==='agency'));
  });
  document.getElementById('section-branch').style.display = tab==='branch'?'block':'none';
  document.getElementById('section-agency').style.display = tab==='agency'?'block':'none';
}

// ── Toast ────────────────────────────────────────────────
function showToast(msg) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 260); }, 2400);
}

// ── Init ─────────────────────────────────────────────────
loadData();
renderAll();
</script>
